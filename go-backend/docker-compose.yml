version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: biliup-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: biliup
      MYSQL_USER: biliup
      MYSQL_PASSWORD: biliup123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  biliup:
    build: .
    container_name: biliup
    ports:
      - "19159:19159"
    volumes:
      - ./downloads:/app/downloads
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
